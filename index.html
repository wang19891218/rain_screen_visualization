<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PACCAR Module — Rain Screen Visualization</title>
<link rel="icon" href="data:," />
<link rel="stylesheet" href="css/style.css" />
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/three.module.js",
    "three/addons/": "./vendor/three/addons/"
  }
}
</script>
</head>
<body>
<nav id="top-nav">
  <a class="active" href="./index.html">Module</a>
  <a href="./panel.html">Panel</a>
</nav>

<canvas id="scene"></canvas>

<div id="title" class="panel">
  <h1>WSU NET PACCAR Module</h1>
  <p id="module-dims">STEP-derived shell dimensions loading...</p>
</div>

<div id="controls" class="panel">
  <h2>Module Controls</h2>
  <label class="range-row" for="alpha-slider">
    <span>Shell opacity</span>
    <b id="alpha-value">78%</b>
  </label>
  <input id="alpha-slider" type="range" min="0" max="100" value="78" />
  <button id="btn-reset" class="btn">&#8635;&nbsp; Reset view</button>
  <button id="btn-panels" class="btn on">&#9635;&nbsp; Panels</button>
  <button id="btn-sensors" class="btn on">&#9679;&nbsp; Sensors</button>
  <label class="check-row">
    <input id="chk-dimensions" type="checkbox" />
    <span>Dimensions</span>
  </label>
</div>

<div id="legend" class="panel">
  <h3>Module Layout</h3>
  <div class="leg-row">
    <div class="leg-dot" style="background:#7a4a34"></div>
    <div><b>Rain screen panels</b><small>2 north wall, 4 south wall</small></div>
  </div>
  <div class="leg-row">
    <div class="leg-dot" style="background:#e07a1c"></div>
    <div><b>Exterior sensors</b><small>representative south panel</small></div>
  </div>
  <div class="leg-row">
    <div class="leg-dot" style="background:#2f74d0"></div>
    <div><b>Interior sensors</b><small>centred vertical column</small></div>
  </div>
</div>

<div id="hint" class="panel">Drag to orbit &middot; scroll to zoom</div>

<script type="module" src="js/module-view.js"></script>
</body>
</html>
